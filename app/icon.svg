<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img">
  <title>PTA mark</title>
  <!-- Dark brand background -->
  <circle cx="40" cy="40" r="40" fill="#0D0F14"/>

  <!-- Compass rings -->
  <circle cx="40" cy="40" r="32" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
  <circle cx="40" cy="40" r="22" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

  <!-- Cardinal lines -->
  <line x1="40" y1="8"  x2="40" y2="18"  stroke="#C9A84C" stroke-width="1.8"/>
  <line x1="40" y1="62" x2="40" y2="72"  stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <line x1="8"  y1="40" x2="18" y2="40"  stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <line x1="62" y1="40" x2="72" y2="40"  stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>

  <!-- Center dot -->
  <circle cx="40" cy="40" r="3" fill="#C9A84C"/>

  <!-- North needle (gold) / South needle (muted) -->
  <polygon points="40,10 36,33 40,40 44,33" fill="#C9A84C"/>
  <polygon points="40,70 36,47 40,40 44,47" fill="#C9A84C" opacity="0.25"/>
</svg>
